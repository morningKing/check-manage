<svg xmlns="http://www.w3.org/2000/svg" width="820" height="500" viewBox="0 0 820 500" font-family="-apple-system,'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2a2e36"/></marker>
    <marker id="ahr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
  </defs>
  <rect width="820" height="500" fill="#ffffff"/>
  <text x="30" y="36" font-size="19" font-weight="700" fill="#1a1d21">场景一：单记录更新 · 乐观锁防丢失更新</text>

  <!-- lifelines -->
  <g font-size="12.5" font-weight="600" fill="#1a1d21">
    <rect x="60" y="58" width="120" height="30" rx="6" fill="#2a2e36"/><text x="92" y="78" fill="#fff">用户 A</text>
    <rect x="350" y="58" width="120" height="30" rx="6" fill="#2a2e36"/><text x="382" y="78" fill="#fff">用户 B</text>
    <rect x="640" y="58" width="140" height="30" rx="6" fill="#2a2e36"/><text x="660" y="78" fill="#fff">后端 + DB</text>
  </g>
  <line x1="120" y1="88" x2="120" y2="470" stroke="#d0d3d9" stroke-width="1.2"/>
  <line x1="410" y1="88" x2="410" y2="470" stroke="#d0d3d9" stroke-width="1.2"/>
  <line x1="710" y1="88" x2="710" y2="470" stroke="#d0d3d9" stroke-width="1.2"/>

  <g font-size="11.5" fill="#3a3d44">
    <!-- A read -->
    <line x1="120" y1="120" x2="710" y2="120" stroke="#2a2e36" stroke-width="1.4" marker-end="url(#ah)"/>
    <text x="130" y="113">A 读取记录</text>
    <line x1="710" y1="146" x2="120" y2="146" stroke="#2a2e36" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
    <text x="500" y="139" fill="#8b8f99">返回 {data, _version: 5}</text>

    <!-- B read -->
    <line x1="410" y1="178" x2="710" y2="178" stroke="#2a2e36" stroke-width="1.4" marker-end="url(#ah)"/>
    <text x="420" y="171">B 读取同一记录</text>
    <line x1="710" y1="204" x2="410" y2="204" stroke="#2a2e36" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
    <text x="500" y="197" fill="#8b8f99">返回 {data, _version: 5}</text>

    <!-- B writes first -->
    <line x1="410" y1="244" x2="710" y2="244" stroke="#16a34a" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="420" y="237" fill="#16a34a" font-weight="600">B 保存 PUT {_version: 5}</text>
    <rect x="610" y="256" width="200" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="624" y="274" font-size="11" fill="#1a1d21">UPDATE … WHERE version=5</text>
    <text x="624" y="290" font-size="11" fill="#16a34a">rowcount=1 → version→6 ✓</text>
    <line x1="710" y1="312" x2="410" y2="312" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
    <text x="530" y="305" fill="#16a34a">200 {_version: 6}</text>

    <!-- A writes stale -->
    <line x1="120" y1="356" x2="710" y2="356" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ahr)"/>
    <text x="130" y="349" fill="#dc2626" font-weight="600">A 保存 PUT {_version: 5}（已过期）</text>
    <rect x="610" y="368" width="200" height="44" rx="6" fill="#fef2f2" stroke="#dc2626"/>
    <text x="624" y="386" font-size="11" fill="#1a1d21">UPDATE … WHERE version=5</text>
    <text x="624" y="402" font-size="11" fill="#dc2626">rowcount=0 → 冲突！</text>
    <line x1="710" y1="424" x2="120" y2="424" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahr)"/>
    <text x="360" y="417" fill="#dc2626" font-weight="600">409 VERSION_CONFLICT</text>
    <text x="130" y="452" fill="#8b8f99">前端统一拦截 → 提示「已被他人修改」→ 刷新拉取最新 → 基于 v6 重做</text>
  </g>
</svg>
