<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470" viewBox="0 0 820 470" font-family="-apple-system,'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2a2e36"/></marker>
  </defs>
  <rect width="820" height="470" fill="#ffffff"/>
  <text x="30" y="36" font-size="19" font-weight="700" fill="#1a1d21">场景二：并发创建 · 序号原子分配（计数行 FOR UPDATE 串行化）</text>

  <g font-size="12.5" font-weight="600">
    <rect x="60" y="58" width="130" height="30" rx="6" fill="#2a2e36"/><text x="80" y="78" fill="#fff">请求 A（创建）</text>
    <rect x="340" y="58" width="130" height="30" rx="6" fill="#2a2e36"/><text x="360" y="78" fill="#fff">请求 B（创建）</text>
    <rect x="610" y="58" width="180" height="30" rx="6" fill="#2a2e36"/><text x="624" y="78" fill="#fff">dynamic_sequences 行</text>
  </g>
  <line x1="125" y1="88" x2="125" y2="440" stroke="#d0d3d9"/>
  <line x1="405" y1="88" x2="405" y2="440" stroke="#d0d3d9"/>
  <line x1="700" y1="88" x2="700" y2="440" stroke="#d0d3d9"/>

  <g font-size="11.5" fill="#3a3d44">
    <!-- A acquires lock -->
    <line x1="125" y1="118" x2="700" y2="118" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a2)"/>
    <text x="135" y="111" fill="#16a34a" font-weight="600">A: SELECT current_value … FOR UPDATE</text>
    <rect x="600" y="128" width="200" height="34" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="612" y="150" font-size="11" fill="#1a1d21">A 持有行锁，读到 current=40</text>

    <!-- B blocks -->
    <line x1="405" y1="186" x2="700" y2="186" stroke="#d97706" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#a2)"/>
    <text x="415" y="179" fill="#d97706" font-weight="600">B: SELECT … FOR UPDATE（阻塞等待）</text>
    <rect x="600" y="196" width="200" height="30" rx="5" fill="#fffbeb" stroke="#d97706"/>
    <text x="612" y="216" font-size="11" fill="#d97706">B 在行锁上等待 A 提交</text>

    <!-- A increments + commits -->
    <line x1="125" y1="250" x2="700" y2="250" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <text x="135" y="243" fill="#16a34a">A: UPDATE current=41 → 分配 IC-041 → COMMIT（释放锁）</text>

    <!-- B proceeds -->
    <line x1="405" y1="296" x2="700" y2="296" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <text x="415" y="289" fill="#16a34a" font-weight="600">B: 获锁，读到 current=41（A 已提交）</text>
    <rect x="600" y="306" width="200" height="34" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="612" y="328" font-size="11" fill="#1a1d21">B: UPDATE current=42 → IC-042</text>

    <line x1="125" y1="372" x2="700" y2="372" stroke="#8b8f99" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <rect x="30" y="392" width="760" height="58" rx="8" fill="#f7f8fa" stroke="#e3e4e8"/>
  <text x="46" y="414" font-size="12.5" font-weight="700" fill="#1a1d21">结果：A=IC-041，B=IC-042，无重号。</text>
  <text x="46" y="436" font-size="11.5" fill="#3a3d44">批量创建 N 条：一次 +N 取连续区间 [start, start+N)。常态计数行已存在→PK 查找+锁，免全表扫描；仅首次分配按现有数据 max 播种。</text>
</svg>
